name: Build Flet Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install Flet CLI
      - name: Install Flet CLI
        run: pip install flet-cli==0.82.0

      # 4. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      # 5. Setup JDK
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 6. Accept Android Licenses
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      # 7. Setup Android SDK
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;34.0.0"

      # 8. Verify environment
      - name: Flutter Doctor
        run: flutter doctor -v

      # 9. Build APK
      - name: Build Android APK
        run: flet pack android --release

      # 10. Upload APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-apk
          path: build/android/*.apk
